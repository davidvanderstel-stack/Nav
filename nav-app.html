<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NAV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --dim: #2a2a2a;
    --red: #ff4747;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  .screen { display: none; flex-direction: column; height: 100dvh; }
  .screen.active { display: flex; }

  /* ── START ── */
  #start { justify-content: space-between; padding: 48px 32px 40px; }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
  .brand-name { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; }

  .start-center { flex:1; display:flex; flex-direction:column; justify-content:center; gap:8px; }
  .start-headline { font-size:clamp(52px,14vw,80px); font-weight:700; line-height:.95; letter-spacing:-.03em; }
  .start-headline span { color:var(--accent); }
  .start-sub { font-size:14px; color:var(--muted); font-weight:300; margin-top:12px; font-family:'DM Mono',monospace; }

  .input-section { display:flex; flex-direction:column; gap:12px; }
  .input-group { display:flex; flex-direction:column; gap:4px; }
  .input-label { font-size:10px; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; font-family:'DM Mono',monospace; padding-left:2px; }
  .input-row { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px 16px; transition:border-color .2s; }
  .input-row:focus-within { border-color:var(--accent); }
  .input-row input { background:none; border:none; outline:none; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:400; flex:1; }
  .input-row input::placeholder { color:var(--muted); }
  .input-icon { color:var(--muted); font-size:14px; flex-shrink:0; }
  .gps-btn { background:none; border:none; color:var(--accent); font-size:18px; cursor:pointer; padding:0; flex-shrink:0; }

  .start-btn { background:var(--accent); color:#0a0a0a; border:none; border-radius:4px; padding:18px; font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:transform .12s,opacity .12s; margin-top:4px; }
  .start-btn:active { transform:scale(.98); opacity:.85; }
  .start-btn:disabled { opacity:.4; cursor:not-allowed; }

  .error-msg { font-family:'DM Mono',monospace; font-size:12px; color:var(--red); text-align:center; min-height:18px; letter-spacing:.04em; }

  /* ── LOADING ── */
  #loading { align-items:center; justify-content:center; gap:20px; }
  .loading-spinner { width:48px; height:48px; border:2px solid var(--dim); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); letter-spacing:.12em; }

  /* ── NAV ── */
  #nav { justify-content:space-between; }

  .nav-top { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .nav-dest { display:flex; flex-direction:column; gap:2px; }
  .nav-dest-label { font-size:10px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; font-family:'DM Mono',monospace; }
  .nav-dest-name { font-size:16px; font-weight:600; color:var(--text); max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stop-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:4px; padding:8px 16px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }
  .stop-btn:active { border-color:var(--red); color:var(--red); }

  .nav-main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; position:relative; padding:24px; }

  .maneuver-distance { font-family:'DM Mono',monospace; font-size:clamp(48px,16vw,90px); font-weight:300; color:var(--accent); line-height:1; letter-spacing:-.02em; }
  .maneuver-unit { font-family:'DM Mono',monospace; font-size:14px; color:var(--muted); letter-spacing:.12em; margin-top:-4px; margin-bottom:32px; }

  .arrow-container { position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; }
  .arrow-ring { position:absolute; inset:0; border-radius:50%; border:1px solid var(--dim); }
  .arrow-ring-2 { position:absolute; inset:12px; border-radius:50%; border:1px solid var(--border); }
  .arrow-svg { width:90px; height:90px; transition:transform .6s cubic-bezier(.34,1.56,.64,1); filter:drop-shadow(0 0 20px rgba(232,255,71,.3)); }

  .maneuver-street { font-size:clamp(20px,6vw,28px); font-weight:600; text-align:center; margin-top:28px; line-height:1.2; max-width:280px; }
  .maneuver-instruction { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:.06em; margin-top:8px; text-align:center; }

  .next-preview { background:var(--surface); border-top:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0; }
  .next-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; flex-shrink:0; }
  .next-arrow-small { width:18px; height:18px; flex-shrink:0; }
  .next-street { font-size:14px; font-weight:500; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .next-dist { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); flex-shrink:0; }

  .nav-stats { display:grid; grid-template-columns:1fr 1px 1fr 1px 1fr; padding:20px 24px 32px; border-top:1px solid var(--border); flex-shrink:0; }
  .stat-divider { background:var(--border); }
  .stat { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .stat-val { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:var(--text); line-height:1; }
  .stat-val.accent { color:var(--accent); }
  .stat-key { font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; font-family:'DM Mono',monospace; }

  .gps-badge { position:absolute; top:12px; right:12px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.08em; display:flex; align-items:center; gap:5px; }
  .gps-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }

  /* ── ARRIVED ── */
  #arrived { align-items:center; justify-content:center; gap:24px; padding:40px 32px; }
  .arrived-icon { font-size:72px; animation:arrive .6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes arrive { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
  .arrived-title { font-size:42px; font-weight:700; letter-spacing:-.02em; text-align:center; }
  .arrived-sub { font-size:14px; color:var(--muted); font-family:'DM Mono',monospace; text-align:center; letter-spacing:.06em; }
  .arrived-btn { background:var(--accent); color:#0a0a0a; border:none; border-radius:4px; padding:16px 40px; font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>

<!-- START -->
<div id="start" class="screen active">
  <div class="brand"><div class="brand-dot"></div><div class="brand-name">Navigeer</div></div>
  <div class="start-center">
    <div class="start-headline">Waar<br>naartoe<span>?</span></div>
    <div class="start-sub">// pijlen. straten. niets meer.</div>
  </div>
  <div class="input-section">
    <div class="input-group">
      <div class="input-label">Vertrek</div>
      <div class="input-row">
        <span class="input-icon">◎</span>
        <input type="text" id="origin-input" placeholder="Detecteer via GPS…" readonly>
        <button class="gps-btn" onclick="detectGPS()" title="GPS gebruiken">⌖</button>
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">Bestemming</div>
      <div class="input-row">
        <span class="input-icon">▣</span>
        <input type="text" id="dest-input" placeholder="Voer bestemming in…">
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="start-btn" id="start-btn" onclick="startNav()">ROUTE STARTEN →</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">locatie bepalen…</div>
</div>

<!-- NAV -->
<div id="nav" class="screen">
  <div class="nav-top">
    <div class="nav-dest">
      <div class="nav-dest-label">Naar</div>
      <div class="nav-dest-name" id="nav-dest-name">—</div>
    </div>
    <button class="stop-btn" onclick="stopNav()">STOP</button>
  </div>
  <div class="nav-main">
    <div class="gps-badge"><div class="gps-dot"></div><span id="gps-acc">GPS</span></div>
    <div class="maneuver-distance" id="maneuver-dist">—</div>
    <div class="maneuver-unit" id="maneuver-unit">meter</div>
    <div class="arrow-container">
      <div class="arrow-ring"></div>
      <div class="arrow-ring-2"></div>
      <svg class="arrow-svg" viewBox="0 0 90 90" fill="none">
        <path id="arrow-path" d="M45 75 L45 20 M45 20 L22 43 M45 20 L68 43"
              stroke="#e8ff47" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="maneuver-street" id="maneuver-street">—</div>
    <div class="maneuver-instruction" id="maneuver-instr">—</div>
  </div>
  <div class="next-preview">
    <div class="next-label">Dan</div>
    <svg class="next-arrow-small" viewBox="0 0 24 24" fill="none">
      <path id="next-arrow-path" d="M12 20V6 M12 6L5 13 M12 6L19 13"
            stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="next-street" id="next-street">—</div>
    <div class="next-dist" id="next-dist"></div>
  </div>
  <div class="nav-stats">
    <div class="stat"><div class="stat-val accent" id="stat-eta">—</div><div class="stat-key">aankomst</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val" id="stat-time">—</div><div class="stat-key">minuten</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val" id="stat-dist">—</div><div class="stat-key">km over</div></div>
  </div>
</div>

<!-- ARRIVED -->
<div id="arrived" class="screen">
  <div class="arrived-icon">◎</div>
  <div class="arrived-title">Aangekomen<span style="color:var(--accent)">.</span></div>
  <div class="arrived-sub" id="arrived-dest"></div>
  <button class="arrived-btn" onclick="goHome()">NIEUWE ROUTE</button>
</div>

<script>
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjVjNzU5OTZkOTFhMzRjMjM5NzIwMGQ4OGYxMjkzOWY4IiwiaCI6Im11cm11cjY0In0=';

let userCoords = null;
let watchId = null;
let steps = [];
let currentStep = 0;
let totalDuration = 0;
let totalDistance = 0;
let routeStartTime = null;
let stepStartTime = null;
let lastKnownPos = null;

// ── Arrow SVG paths ──
const ARROWS = {
  straight:      { m: "M45 75 L45 20 M45 20 L22 43 M45 20 L68 43",                       n: "M12 20V6 M12 6L5 13 M12 6L19 13" },
  right:         { m: "M30 72 Q30 45 58 45 L58 20 M58 20 L35 43 M58 20 L81 43",           n: "M6 18 H16 Q18 10 18 4 M18 4 L11 11 M18 4 L25 11" },
  'sharp right': { m: "M22 72 Q22 35 60 35 L60 12 M60 12 L37 35 M60 12 L83 35",           n: "M4 20 H14 Q16 8 16 2 M16 2 L9 9 M16 2 L23 9" },
  left:          { m: "M60 72 Q60 45 32 45 L32 20 M32 20 L9 43 M32 20 L55 43",            n: "M18 18 H8 Q6 10 6 4 M6 4 L13 11 M6 4 L-1 11" },
  'sharp left':  { m: "M68 72 Q68 35 30 35 L30 12 M30 12 L7 35 M30 12 L53 35",            n: "M20 20 H10 Q8 8 8 2 M8 2 L1 9 M8 2 L15 9" },
  'slight right':{ m: "M38 75 Q48 48 62 20 M62 20 L40 28 M62 20 L67 44",                  n: "M8 20 Q12 12 18 6 M18 6 L10 8 M18 6 L19 14" },
  'slight left': { m: "M52 75 Q42 48 28 20 M28 20 L50 28 M28 20 L23 44",                  n: "M16 20 Q12 12 6 6 M6 6 L14 8 M6 6 L5 14" },
  uturn:         { m: "M30 72 L30 40 Q30 14 55 14 Q76 14 76 40 L76 56 M76 56 L61 43 M76 56 L89 43", n: "M8 20 L8 8 Q8 2 14 2 Q20 2 20 8 L20 14 M20 14 L14 9 M20 14 L26 9" },
  roundabout:    { m: "M45 62 A20 20 0 1 1 65 45 M65 45 L58 38 M65 45 L72 38",            n: "M12 14 A6 6 0 1 1 18 8 M18 8 L14 5 M18 8 L21 5" },
  arrive:        { m: "M45 70 L45 30 M30 50 L45 30 L60 50 M25 76 L65 76",                 n: "M12 18 L12 6 M6 14 L12 6 L18 14 M5 20 L19 20" },
};

// ORS type → arrow key
function orsArrow(t) {
  const map = { 0:'left',1:'right',2:'sharp left',3:'sharp right',4:'slight left',5:'slight right',6:'straight',7:'roundabout',8:'roundabout',9:'uturn',10:'arrive',11:'straight' };
  return map[t] || 'straight';
}
// ORS type → Dutch instruction
function orsNL(t) {
  const map = { 0:'linksaf',1:'rechtsaf',2:'scherp linksaf',3:'scherp rechtsaf',4:'licht linksaf',5:'licht rechtsaf',6:'rechtdoor',7:'rotonde oprijden',8:'rotonde verlaten',9:'keren',10:'u bent er',11:'vertrek' };
  return map[t] || 'rechtdoor';
}

function getArrow(key) { return ARROWS[key] || ARROWS.straight; }

// ── GPS helpers ──
function getPosition(opts) {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) return rej(new Error('Geen GPS beschikbaar'));
    navigator.geolocation.getCurrentPosition(res, rej, opts || { enableHighAccuracy: true, timeout: 12000 });
  });
}

async function detectGPS() {
  const inp = document.getElementById('origin-input');
  inp.placeholder = 'GPS zoeken…';
  setError('');
  try {
    const pos = await getPosition();
    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    inp.value = `${userCoords.lat.toFixed(5)}, ${userCoords.lng.toFixed(5)}`;
    // Reverse geocode for friendly name
    try {
      const r = await fetch(`https://api.openrouteservice.org/geocode/reverse?api_key=${ORS_KEY}&point.lon=${userCoords.lng}&point.lat=${userCoords.lat}&size=1`);
      const d = await r.json();
      if (d.features && d.features.length) inp.value = d.features[0].properties.label;
    } catch(_) {}
  } catch(e) {
    setError('GPS fout: ' + (e.message || 'onbekend'));
    document.getElementById('origin-input').placeholder = 'GPS niet beschikbaar';
  }
}

// ── Geocode destination text ──
async function geocode(query) {
  const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}&size=1`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.features || !d.features.length) throw new Error('Bestemming niet gevonden');
  const [lng, lat] = d.features[0].geometry.coordinates;
  return { lat, lng, label: d.features[0].properties.label };
}

// ── Fetch walking route from ORS ──
async function fetchRoute(from, to) {
  const body = {
    coordinates: [[from.lng, from.lat], [to.lng, to.lat]],
    instructions: true,
    language: 'nl',
    units: 'm'
  };
  const r = await fetch('https://api.openrouteservice.org/v2/directions/foot-walking/json', {
    method: 'POST',
    headers: { 'Authorization': ORS_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `ORS fout ${r.status}`);
  }
  const d = await r.json();
  if (!d.routes || !d.routes.length) throw new Error('Geen route gevonden');
  return d.routes[0];
}

// ── Parse ORS steps into our format ──
function parseSteps(route) {
  const seg = route.segments[0];
  return seg.steps.map((s, i) => {
    const next = seg.steps[i + 1];
    return {
      dist: Math.round(s.distance),
      duration: s.duration,
      street: s.name || '—',
      instr: orsNL(s.type),
      arrowKey: orsArrow(s.type),
      nextStreet: next ? (next.name || '—') : '—',
      nextDist: next ? fmtDist(next.distance) : '',
    };
  });
}

// ── Haversine distance (meters) between two coords ──
function haversine(a, b) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (b.lat - a.lat) * rad;
  const dLng = (b.lng - a.lng) * rad;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*rad)*Math.cos(b.lat*rad)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ── Start navigation ──
async function startNav() {
  const destText = document.getElementById('dest-input').value.trim();
  if (!destText) { setError('Voer een bestemming in'); return; }
  setError('');
  document.getElementById('start-btn').disabled = true;
  showScreen('loading');

  try {
    if (!userCoords) {
      setLoading('locatie bepalen…');
      const pos = await getPosition();
      userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    }

    setLoading('bestemming zoeken…');
    const dest = await geocode(destText);

    setLoading('route berekenen…');
    const route = await fetchRoute(userCoords, dest);

    steps = parseSteps(route);
    totalDuration = route.summary.duration;
    totalDistance = route.summary.distance;
    currentStep = 0;
    routeStartTime = Date.now();
    stepStartTime = Date.now();

    document.getElementById('nav-dest-name').textContent = dest.label || destText;
    document.getElementById('arrived-dest').textContent = '// ' + (dest.label || destText).toLowerCase();

    showScreen('nav');
    renderStep(0);
    startGPSWatch();

  } catch(e) {
    showScreen('start');
    setError(e.message || 'Fout bij ophalen route');
  }
  document.getElementById('start-btn').disabled = false;
}

// ── Live GPS tracking ──
function startGPSWatch() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(onPos, onPosErr, {
    enableHighAccuracy: true, maximumAge: 1500, timeout: 10000
  });
}

function onPos(pos) {
  const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  userCoords = coords;
  const acc = Math.round(pos.coords.accuracy);
  document.getElementById('gps-acc').textContent = `±${acc}m`;

  if (currentStep >= steps.length) return;

  // Check if we've passed enough steps based on elapsed time + proximity
  updateCurrentStep(coords);
}

function onPosErr() {
  document.getElementById('gps-acc').textContent = 'GPS fout';
}

function updateCurrentStep(coords) {
  // Use time-based progression as primary signal,
  // clamped so we don't skip steps too fast
  const elapsed = (Date.now() - routeStartTime) / 1000;
  let acc = 0;
  let found = false;
  for (let i = 0; i < steps.length; i++) {
    acc += steps[i].duration;
    if (elapsed < acc) {
      if (i > currentStep) {
        currentStep = i;
        stepStartTime = Date.now();
        renderStep(currentStep);
      }
      // Update distance remaining for this step
      const stepElapsed = (Date.now() - stepStartTime) / 1000;
      const frac = Math.max(0, 1 - stepElapsed / steps[i].duration);
      const distLeft = Math.round(steps[i].dist * frac);
      setDistDisplay(distLeft);
      updateStats();
      found = true;
      break;
    }
  }
  if (!found) arrive();
}

// ── Render a step ──
function renderStep(i) {
  if (i >= steps.length) { arrive(); return; }
  const s = steps[i];
  const a = getArrow(s.arrowKey);
  document.getElementById('arrow-path').setAttribute('d', a.m);
  document.getElementById('next-arrow-path').setAttribute('d', a.n);
  setDistDisplay(s.dist);
  document.getElementById('maneuver-street').textContent = s.street;
  document.getElementById('maneuver-instr').textContent = s.instr;
  document.getElementById('next-street').textContent = s.nextStreet;
  document.getElementById('next-dist').textContent = s.nextDist;
  stepStartTime = Date.now();
  updateStats();
}

function setDistDisplay(m) {
  if (m >= 1000) {
    document.getElementById('maneuver-dist').textContent = (m / 1000).toFixed(1);
    document.getElementById('maneuver-unit').textContent = 'km';
  } else {
    document.getElementById('maneuver-dist').textContent = m;
    document.getElementById('maneuver-unit').textContent = 'meter';
  }
}

function updateStats() {
  const elapsed = (Date.now() - routeStartTime) / 1000;
  const remaining = Math.max(0, totalDuration - elapsed);
  const distDone = steps.slice(0, currentStep).reduce((a, s) => a + s.dist, 0);
  const distLeft = Math.max(0, totalDistance - distDone);

  const eta = new Date(Date.now() + remaining * 1000);
  document.getElementById('stat-eta').textContent =
    eta.getHours().toString().padStart(2,'0') + ':' +
    eta.getMinutes().toString().padStart(2,'0');
  document.getElementById('stat-time').textContent = Math.max(1, Math.ceil(remaining / 60));
  document.getElementById('stat-dist').textContent = (distLeft / 1000).toFixed(1);
}

function fmtDist(m) {
  if (!m && m !== 0) return '';
  return m < 1000 ? `over ${Math.round(m)}m` : `over ${(m / 1000).toFixed(1)}km`;
}

function arrive() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  showScreen('arrived');
}

function stopNav() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  showScreen('start');
}

function goHome() { showScreen('start'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setLoading(msg) { document.getElementById('loading-text').textContent = msg; }
function setError(msg) { document.getElementById('error-msg').textContent = msg; }

// Auto GPS on load
window.addEventListener('load', () => detectGPS());
</script>
</body>
</html>
